# 파일 포멧 버전
version: "3.8"

# 생성될 컨테이너를 묶는 단위
services:
  frontend:
    build: ./frontend
    container_name: frontend
    restart: no
    volumes:
      - frontend_build:/app/dist
  
  # 컨테이너 이름
  nginx:
    container_name: nginx
    # 정의된 도커파일 경로
    image: nginx:alpine
    # 포트오픈
    ports:
      - "80:80"
    # 명시된 컨테이너 실행 후 동작
    depends_on:
      - api
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - frontend_build:/usr/share/nginx/html
      - nginx_logs:/var/log/nginx
    networks:
      - frontend_network
      - backend_network

  api:
    build: ./api
    container_name: api
    restart: always
    environment:
      - DB_HOST=host.docker.internal
      - DB_USER=root
      - DB_PASSWORD=12345678
      - DB_NAME=dashboard
      - DB_PORT=3306
    volumes:
      - api_logs:/app/logs
      - api_uploads:/app/uploads
    networks:
      - backend_network

volumes:
  frontend_build:
  nginx_logs:
  api_logs:
  api_uploads:
#  db_data:

networks:
  frontend_network:
  backend_network: